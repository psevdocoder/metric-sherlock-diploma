syntax = "proto3";

package metricsherlock.targetgroups.v1;

option go_package = "git.server.lan/maksim/metric-sherlock-diploma/proto/metricsherlock/targetgroups/v1;targetgroupsv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service TargetGroupsService {
  rpc ListTargetGroups(ListTargetGroupsRequest) returns (ListTargetGroupsResponse) {
    option (google.api.http) = {
      get: "/api/v1/target-groups"
    };
  }

  rpc GetTargetGroup(GetTargetGroupRequest) returns (GetTargetGroupResponse) {
    option (google.api.http) = {
      get: "/api/v1/target-groups/{id}"
    };
  }

  rpc ListMetricWhitelist(ListMetricWhitelistRequest) returns (ListMetricWhitelistResponse) {
    option (google.api.http) = {
      get: "/api/v1/whitelist/metrics"
    };
  }

  rpc UpsertMetricWhitelist(UpsertMetricWhitelistRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/whitelist/metrics"
      body: "*"
    };
  }

  rpc DeleteMetricWhitelist(DeleteMetricWhitelistRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/whitelist/metrics/{target_group}/{env}/{metric_name}"
    };
  }

  rpc ListTargetWhitelist(ListTargetWhitelistRequest) returns (ListTargetWhitelistResponse) {
    option (google.api.http) = {
      get: "/api/v1/whitelist/targets"
    };
  }

  rpc UpsertTargetWhitelist(UpsertTargetWhitelistRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/whitelist/targets"
      body: "*"
    };
  }

  rpc DeleteTargetWhitelist(DeleteTargetWhitelistRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/whitelist/targets/{target_group}/{env}"
    };
  }

  rpc GetMetricCheckLimits(GetMetricCheckLimitsRequest) returns (GetMetricCheckLimitsResponse) {
    option (google.api.http) = {
      get: "/api/v1/settings/metric-check-limits"
    };
  }

  rpc UpdateMetricCheckLimits(UpdateMetricCheckLimitsRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/settings/metric-check-limits"
      body: "*"
    };
  }

  rpc GetScrapeTasksSchedule(GetScrapeTasksScheduleRequest) returns (GetScrapeTasksScheduleResponse) {
    option (google.api.http) = {
      get: "/api/v1/settings/scrape-tasks-schedule"
    };
  }

  rpc UpdateScrapeTasksSchedule(UpdateScrapeTasksScheduleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/api/v1/settings/scrape-tasks-schedule"
      body: "*"
    };
  }
}

message ListTargetGroupsRequest {
  string team_name = 1;
}

message ListTargetGroupsResponse {
  repeated TargetGroupSummary target_groups = 1;
}

message GetTargetGroupRequest {
  int64 id = 1;
}

message GetTargetGroupResponse {
  TargetGroupDetails target_group = 1;
}

message ListMetricWhitelistRequest {
  string target_group = 1;
  string env = 2;
}

message ListMetricWhitelistResponse {
  repeated MetricWhitelistItem items = 1;
}

message UpsertMetricWhitelistRequest {
  MetricWhitelistItem item = 1;
}

message DeleteMetricWhitelistRequest {
  string target_group = 1;
  string env = 2;
  string metric_name = 3;
}

message MetricWhitelistItem {
  string target_group = 1;
  string env = 2;
  string metric_name = 3;
  MetricWhitelistChecks checks = 4;
}

message MetricWhitelistChecks {
  int64 metric_name_length = 1;
  int64 label_name_length = 2;
  int64 label_value_length = 3;
  int64 cardinality = 4;
  int64 histogram_buckets = 5;
}

message ListTargetWhitelistRequest {
  string target_group = 1;
  string env = 2;
}

message ListTargetWhitelistResponse {
  repeated TargetWhitelistItem items = 1;
}

message UpsertTargetWhitelistRequest {
  TargetWhitelistItem item = 1;
}

message DeleteTargetWhitelistRequest {
  string target_group = 1;
  string env = 2;
}

message TargetWhitelistItem {
  string target_group = 1;
  string env = 2;
  TargetWhitelistChecks checks = 3;
}

message TargetWhitelistChecks {
  bool metric_name_length = 1;
  bool label_name_length = 2;
  bool label_value_length = 3;
  bool cardinality = 4;
  bool histogram_buckets = 5;
  bool response_weight = 6;
}

message GetMetricCheckLimitsRequest {}

message GetMetricCheckLimitsResponse {
  MetricCheckLimits limits = 1;
}

message UpdateMetricCheckLimitsRequest {
  MetricCheckLimits limits = 1;
}

message MetricCheckLimits {
  int64 max_metric_name_len = 1;
  int64 max_label_name_len = 2;
  int64 max_label_value_len = 3;
  int64 max_metric_cardinality = 4;
  int64 max_histogram_buckets = 5;
  int64 max_bytes_weight = 6;
}

message GetScrapeTasksScheduleRequest {}

message GetScrapeTasksScheduleResponse {
  string cron_expr = 1;
}

message UpdateScrapeTasksScheduleRequest {
  string cron_expr = 1;
}

message TargetGroupDetails {
  TargetGroupSummary summary = 1;
  ViolationDetails violations = 2;
  google.protobuf.Timestamp report_created_at = 3;
}

message TargetGroupSummary {
  int64 id = 1;
  string name = 2;
  string env = 3;
  string cluster = 4;
  string job = 5;
  string team_name = 6;
  google.protobuf.Timestamp first_check = 7;
  google.protobuf.Timestamp last_check = 8;
  ViolationStats violation_stats = 9;
}

message ViolationStats {
  int32 total = 1;
  int32 metric_name_too_long = 2;
  int32 label_name_too_long = 3;
  int32 label_value_too_long = 4;
  int32 cardinality = 5;
  int32 histogram_buckets = 6;
  int64 response_weight = 7;
}

message ViolationDetails {
  repeated MetricNameViolation metric_name_too_long = 1;
  repeated LabelNameViolation label_name_too_long = 2;
  repeated LabelValueViolation label_value_too_long = 3;
  repeated CardinalityViolation cardinality = 4;
  repeated HistogramBucketsViolation histogram_buckets = 5;
  MaxViolationStats max = 6;
  int64 response_weight = 7;
  CheckMetrics checks = 8;
}

message CheckMetrics {
  CheckMetric metric_name_length = 1;
  CheckMetric label_name_length = 2;
  CheckMetric label_value_length = 3;
  CheckMetric cardinality = 4;
  CheckMetric histogram_buckets = 5;
  CheckMetric response_weight = 6;
}

message CheckMetric {
  int64 limit = 1;
  int64 current = 2;
}

message MaxViolationStats {
  MetricNameViolation metric_name_too_long = 1;
  LabelNameViolation label_name_too_long = 2;
  LabelValueViolation label_value_too_long = 3;
  CardinalityViolation cardinality = 4;
  HistogramBucketsViolation histogram_buckets = 5;
}

message MetricNameViolation {
  string metric_name = 1;
  int32 length = 2;
}

message LabelNameViolation {
  string metric_name = 1;
  string label_name = 2;
  int32 length = 3;
}

message LabelValueViolation {
  string metric_name = 1;
  string label_name = 2;
  string value = 3;
  int32 length = 4;
}

message CardinalityViolation {
  string metric_name = 1;
  int32 value = 2;
}

message HistogramBucketsViolation {
  string metric_name = 1;
  int32 buckets = 2;
}
