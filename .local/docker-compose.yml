x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.5.0
  restart: unless-stopped
  environment:
    # --- KRaft ---
    KAFKA_ENABLE_KRAFT: "yes"
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_NODE_ID: 1
    CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    # --- Networking ---
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

    KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092,EXTERNAL://localhost:19092

    # --- KRaft quorum ---
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093

    # --- single node ---
    KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    KAFKA_MIN_INSYNC_REPLICAS: 1
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    # --- misc ---
    KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_LOG_DIRS: /var/lib/kafka/data
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metric-sherlock
    volumes:
      - ./data/postgres:/var/lib/postgresql

  kafka-permissions:
    image: alpine:3.20
    container_name: kafka-permissions
    command: >
      sh -c "
        mkdir -p /var/lib/kafka/data &&
        chown -R 1000:1000 /var/lib/kafka/data
      "
    volumes:
      - ./data/kafka1:/var/lib/kafka/data
    restart: "no"

  kafka1:
    <<: *kafka-common
    container_name: kafka1
    hostname: kafka1

    depends_on:
      - kafka-permissions

    ports:
      - "9092:9092"
      - "19092:19092"

    volumes:
      - ./data/kafka1:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - kafka1
    command: >
      bash -c "
        set -e

        echo 'Waiting for Kafka...'

        until kafka-topics --bootstrap-server kafka1:9092 --list >/dev/null 2>&1; do
          sleep 2
        done

        echo 'Kafka ready, waiting controller...'
        sleep 10

        echo 'Creating topic...'

        kafka-topics --bootstrap-server kafka1:9092 --create --if-not-exists --topic metric-sherlock --partitions 3 --replication-factor 1

        echo 'Done'
      "
    restart: "no"