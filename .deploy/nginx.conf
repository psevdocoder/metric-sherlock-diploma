events {}

http {
  # DNS Docker
  resolver 127.0.0.11 valid=10s ipv6=off;

  # upstream с динамическим резолвом
  upstream metric_sherlock {
    zone metric_sherlock 64k;
    server metric-sherlock:7002 resolve;
  }

  upstream metric_sherlock_ui {
      zone metric_sherlock_ui 64k;
      server metric-sherlock-ui:80 resolve;
    }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://metric_sherlock;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # чтобы не держал мёртвые соединения
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
    }

    location / {
      proxy_pass http://metric_sherlock_ui;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # чтобы не держал мёртвые соединения
      proxy_connect_timeout 2s;
      proxy_read_timeout 10s;
    }
  }
}