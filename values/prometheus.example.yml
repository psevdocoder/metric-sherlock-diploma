scrape_configs:
  - job_name: "apps"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "service-1-1.example.com:8080"
        labels:
          env: "prod"
          target_group: "service-1"
      - targets:
          - "service-2-1.example.com:8080"
        labels:
          env: "prod"
          target_group: "service-2"
      - targets:
          - "service-3-1.example.com:8080"
        labels:
          env: "prod"
          target_group: "service-3"
          cluster: "k8s-prod"
