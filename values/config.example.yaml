values:
  - name: port
    value: int
    usage: HTTP port to bind to
  - name: env
    value: string
    usage: Application environment (dev, prod)
  - name: produce_tasks_cron_expr
    value: string
    usage: Cron expression for scrape task producer
  - name: limits_config
    value: string
    usage: JSON encoded limits config for metrics checks
  - name: kafka_brokers
    value: string
    usage: Comma separated kafka brokers
  - name: kafka_violations_topic
    value: string
    usage: Kafka topic for service violation facts
  - name: outbox_poll_interval
    value: duration
    usage: Interval for polling outbox rows
  - name: outbox_batch_size
    value: int
    usage: Max outbox messages per poll
  - name: outbox_max_retries
    value: int
    usage: Max retries before marking outbox row as failed
  - name: jwt_issuer
    value: string
    usage: Expected JWT issuer (iss), e.g. http://localhost:8080/realms/local
  - name: jwt_jwks_endpoint
    value: string
    usage: Optional JWKS endpoint override; empty means issuer + /protocol/openid-connect/certs
  - name: jwt_expected_azp
    value: string
    usage: Optional expected azp value (client id)

secrets:
  - name: db_password
    value: string
    usage: Database password

realtime_config:
  - name: feature_enabled
    value: bool
    usage: Whether feature X is enabled
  - name: threshold
    value: float64
    usage: Threshold for triggering alert
  - name: timeout
    value: duration
    usage: Request timeout duration
